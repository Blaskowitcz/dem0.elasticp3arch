<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elasticpearch</title>
    <style>
        /* Centers everything on the screen */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50; /* Dark blue-grey background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Styles the main text */
        h1 {
            font-size: 3rem;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        /* Creates the circular shape for the loader */
        .loading-spinner {
            border: 8px solid rgba(255, 255, 255, 0.1); /* Faded transparent border */
            border-top: 8px solid #3498db; /* Bright blue spinning section */
            border-radius: 50%;
            width: 70px;
            height: 70px;
            /* Applies the infinite spinning animation */
            animation: spin 1s linear infinite; 
        }

        /* Defines how the spinning animation works */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>elasticpearch</h1>
    
    <div class="loading-spinner"></div>

</body>
</html>
